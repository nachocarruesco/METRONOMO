<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Metrónomo Flamenco Pro</title>
    <link rel="stylesheet" href="css/styles.css?v=2">
</head>
<body>

    <h1>Metrónomo Flamenco</h1>
    <p class="subtitle">Pulsa los puntos del círculo para editar o crear marcas</p>

    <div id="loadingStatus">Cargando muestras de audio...</div>

    <div id="panel">
        <div class="control-group">
    <label>Preset Ritmo</label>
    <select id="presetSelect"></select>
</div>

<div class="control-group">
    <label>Cierre</label>
    <select id="cierreSelect">
        <option value="">Automático</option>
    </select>
</div>

        <div class="control-group">
            <label>BPM</label>
            <input type="number" id="bpm" value="80" min="40" max="300">
        </div>

        <div class="control-group">
            <label>Instrumento</label>
            <select id="soundMode">
                <option value="cajon">Modo Cajón</option>
                <option value="palmas">Modo Palmas</option>
            </select>
        </div>

        <div class="control-group" style="text-align: center;">
            <label>Claqueta</label>
            <input type="checkbox" id="metronomeCheck">
        </div>

        <div class="control-group" style="text-align: center;">
            <label>Cierre</label>
            <input type="checkbox" id="cierresCheck">
        </div>

        <div class="control-group" style="padding-top: 15px;">
            <button id="start" disabled>▶ Iniciar</button>
            <button id="stop">■ Parar</button>
        </div>
    </div>

    <br>
    <div class="canvas-container">
        <canvas id="canvas" width="600" height="600"></canvas>
        <div id="lapCounter">1</div>
    </div>

    <script src="js/presets.js?v=6"></script>
    <script src="js/audio-engine.js"></script>
    <script src="js/app.js?v=4"></script>
</body>
</html>
